<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Fábio Ramos | Psicólogo e Hipnólogo em São José dos Pinhais e Região</title>
    
    <!-- Meta descrição atualizada com foco em conversão e busca local -->

    <meta name="keywords" content="psicologia, psicoterapia, hipnose, hipnoterapia, tratamento psicologico, depressão, ansiedade, pânico, relacionamentos, transtornos, desenvolvimento pessoal, gerenciamento de problemas, psicologo sao jose dos pinhais, psicologo curitiba, terapia sjp, clinica de psicologia">

    <link rel="canonical" href="https://psicologofabioramos.com.br/">

    <meta property="og:title" content="Fábio Ramos | Psicólogo Clínico & Hipnoterapeuta">
    <meta property="og:description" content="Tratamento psicológico focado em transformar vidas. Atendimento em São José dos Pinhais, Curitiba e Online.">

    <style>
        /* ... (O restante do seu código permanece igual) ... */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            color: #e2e8f0; 
            background-color: #12241a; 
            line-height: 1.6;
        }

        .wrapper-site {
            max-width: 1200px;
            margin: 0 auto;
            background-color: #12241a; 
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.3);
            position: relative; 
        }

        header {
            background-color: #12241a; 
            padding: 0 4%; 
            display: flex;
            flex-direction: row; 
            justify-content: flex-end; 
            align-items: center;
            border-bottom: 1px solid #276749;
            min-height: 60px; 
            position: relative;
        }

        .logo-container {
            position: absolute;
            left: 4%;
            top: 50%; 
            transform: translateY(-50%); 
            z-index: 99; 
        }

        .logo-container img {
            height: 300px; 
            width: auto;
            display: block;
        }

        nav {
            display: flex;
            gap: 25px;
            height: 60px;
            align-items: center;
        }

        nav a {
            text-decoration: none;
            color: #cbd5e0; 
            font-weight: 500;
            font-size: 15px;
            transition: color 0.3s;
        }

        nav a:hover {
            color: #48bb78; 
        }

        .hero-layout-fusao {
            position: relative;
            width: 100%;
            min-height: 650px; 
            background-color: #12241a; 
            background: url('fundo.png') no-repeat center top/contain, #12241a;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; 
            padding: 20px 40px 0 40px;
            text-align: center;
        }

        .hero-layout-fusao::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 15%; 
            background: linear-gradient(transparent, rgba(18, 36, 26, 1));
            z-index: 1;
        }

        .hero-conteudo-inferior {
            position: relative;
            z-index: 2; 
            margin-top: auto; 
            padding-top: 480px; 
            margin-bottom: 15px;
        }

        .hero-layout-fusao h1 {
            font-size: 38px;
            color: #ffffff;
            margin-bottom: 12px;
            font-weight: 700;
            text-shadow: 0 2px 8px rgba(0,0,0,0.9);
        }

        .hero-layout-fusao p {
            font-size: 19px;
            color: #e6fffa; 
            max-width: 850px;
            margin: 0 auto;
            text-shadow: 0 2px 6px rgba(0,0,0,0.9);
        }

        .hero-botao-container {
            text-align: center;
            padding: 20px 20px 60px 20px;
            background-color: #12241a;
        }

        .btn-principal {
            background-color: #38a169; 
            color: #ffffff; 
            padding: 16px 45px;
            text-decoration: none;
            border-radius: 30px; 
            font-weight: bold;
            font-size: 19px;
            box-shadow: 0 4px 15px rgba(56, 161, 105, 0.4);
            transition: all 0.3s ease;
            display: inline-block;
        }

        .btn-principal:hover {
            background-color: #276749;
            transform: translateY(-2px);
        }

        .container {
            padding: 100px 8%; 
            background-color: #12241a;
        }

        .container:nth-of-type(even) {
            background-color: #0e1d15; 
        }

        h2 {
            text-align: center;
            color: #ffffff; 
            font-size: 34px;
            margin-bottom: 50px;
            position: relative;
            font-weight: 700;
            z-index: 2;
        }

        h2::after {
            content: '';
            display: block;
            width: 65px;
            height: 4px;
            background-color: #38a169; 
            margin: 15px auto 0;
        }

        #sobre {
            position: relative;
            background: url('foto2.png') no-repeat center center/cover;
            overflow: hidden;
        }

        #sobre::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(18, 36, 26, 0.85); 
            z-index: 1;
        }

        .sobre-conteudo-vertical {
            position: relative;
            z-index: 2; 
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            max-width: 850px;
            margin: 0 auto;
        }

        .sobre-texto-abaixo {
            width: 100%;
            font-size: 18px;
            color: #e2e8f0;
            margin-top: 20px;
        }

        .formacao-lista {
            margin: 40px auto 0 auto;
            list-style-type: none;
            max-width: 550px;
            text-align: left; 
        }

        .formacao-lista li {
            position: relative;
            padding-left: 35px;
            margin-bottom: 20px;
            color: #ffffff;
            font-size: 17px;
        }

        .formacao-lista li::before {
            content: '✓';
            position: absolute;
            left: 0;
            color: #48bb78; 
            font-weight: bold;
            font-size: 20px;
        }

        .grid-layout {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 35px;
        }

        .card {
            background: #1a3325; 
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 6px 25px rgba(0,0,0,0.2); 
            border-top: 5px solid #38a169; 
            color: #cbd5e0;
        }

        .card h3 {
            margin-bottom: 20px;
            color: #ffffff; 
            font-size: 22px;
        }

        .instagram-elfsight-container,
        .google-trustmary-container {
            margin-top: 40px;
            width: 100%;
        }

        .btn-google {
            background-color: #4285f4;
            color: white;
            padding: 14px 35px;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            display: inline-block;
            margin-top: 35px;
        }

        footer {
            background-color: #0a140f; 
            color: #a0aec0;
            text-align: center;
            padding: 60px 5%;
            font-size: 14px;
            border-top: 1px solid #1a3325;
        }

        @media (max-width: 768px) {
            header { flex-direction: column; padding: 15px; gap: 10px; min-height: auto; }
            .logo-container { position: relative; top: 0; left: 0; transform: none; justify-content: center; margin-bottom: 10px; }
            .logo-container img { height: 120px; } 
            nav { justify-content: center; flex-wrap: wrap; gap: 15px; height: auto; }
            .hero-layout-fusao h1 { font-size: 30px; }
            .hero-layout-fusao { min-height: 500px; padding: 20px; }
            .hero-conteudo-inferior { padding-top: 300px; }
            .container { padding: 60px 5%; }
        }
    </style>
</head>

</html>
